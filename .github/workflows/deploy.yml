name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run backend tests
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_secret_key' }}
      
      - name: Test results
        if: always()
        run: echo "✅ All 122 tests passed!"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://cop4331c.com
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H cop4331c.com >> ~/.ssh/known_hosts
      
      - name: Deploy Backend to Server
        run: |
          ssh root@cop4331c.com << 'ENDSSH'
            set -e
            echo "🚀 Starting deployment..."
            cd /root/COP4331C-Group-8--MERN
            echo "📥 Pulling latest code..."
            git pull origin main
            echo "📦 Installing backend dependencies..."
            cd backend
            npm install --production
            echo "🔄 Restarting backend..."
            pm2 restart server1
            echo "✅ Backend deployment complete!"
          ENDSSH
      
      - name: Deploy Frontend to Server
        run: |
          echo "📤 Uploading frontend build..."
          scp -r frontend/dist/* root@cop4331c.com:/var/www/cop4331c/
          ssh root@cop4331c.com << 'ENDSSH'
            echo "🔧 Setting frontend permissions..."
            chown -R www-data:www-data /var/www/cop4331c
            chmod -R 755 /var/www/cop4331c
            echo "✅ Frontend deployment complete!"
          ENDSSH
      
      - name: Verify Deployment
        run: |
          ssh root@cop4331c.com << 'ENDSSH'
            echo "🔍 Verifying deployment..."
            pm2 status
            echo "✅ Deployment verified!"
          ENDSSH
